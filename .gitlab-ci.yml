# Converted from GitHub Actions — penguins-eggs-audit
# Mirrors: ci.yml

stages:
  - secret-scan
  - test

default:
  image: node:22

secret-scan:
  stage: secret-scan
  image: python:3.12-slim
  before_script:
    - pip install git-filter-repo --quiet
  script:
    - |
      echo "Scanning commit history for leaked GitLab PATs..."
      git log --all -p | grep -E "glpat-[A-Za-z0-9_-]{20,}" && echo "LEAKED TOKEN DETECTED" && exit 1 || echo "No leaked tokens found."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master)$/'

.node-cache: &node-cache
  cache:
    key:
      files: [package-lock.json, package.json]
    paths: [node_modules/]

test:node-20:
  stage: test
  image: node:20
  <<: *node-cache
  script:
    - npm ci
    - npm run build || true
    - npm test || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master)$/'

test:node-22:
  stage: test
  image: node:22
  <<: *node-cache
  script:
    - npm ci
    - npm run build || true
    - npm test || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master)$/'
